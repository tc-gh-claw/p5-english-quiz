<!DOCTYPE html>
<html lang="zh-HK">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小五英文測驗 - 2025年第二學期考試</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://code.responsivevoice.org/responsivevoice.js?key=ktuS1y2e"></script>
    <style>

        .header .subtitle { font-size: 0.95rem; opacity: 0.9; }
        .shrimp-icon { font-size: 2.5rem; margin-bottom: 5px; }
        .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
        .card-title { font-size: 1.2rem; font-weight: 700; color: #5a67d8; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .menu-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; padding: 15px 10px; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.3s; display: flex; flex-direction: column; align-items: center; gap: 5px; min-height: 90px; }
        .menu-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(102,126,234,0.4); }
        .menu-btn.secondary { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .menu-btn.success { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .menu-btn.warning { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .menu-btn .icon { font-size: 1.5rem; }
        .section { display: none; }
        .section.active { display: block; }
        .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #e2e8f0; }
        .quiz-progress { font-size: 0.9rem; color: #718096; font-weight: 600; }
        .quiz-score { font-size: 1rem; font-weight: 700; color: #5a67d8; }
        .progress-bar { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; margin-bottom: 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); border-radius: 4px; transition: width 0.3s ease; }
        .question-card { background: #f7fafc; border-radius: 12px; padding: 18px; margin-bottom: 15px; }
        .question-type { font-size: 0.75rem; color: #718096; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .question-text { font-size: 1.15rem; font-weight: 700; color: #2d3748; line-height: 1.5; }
        .options-grid { display: grid; gap: 10px; }
        .option-btn { background: white; border: 3px solid #e2e8f0; border-radius: 12px; padding: 15px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; text-align: left; display: flex; align-items: center; gap: 12px; }
        .option-btn:hover { border-color: #667eea; background: #f7fafc; }
        .option-btn.selected { border-color: #667eea; background: #e0e7ff; }
        .option-btn.correct { border-color: #48bb78; background: #c6f6d5; }
        .option-btn.wrong { border-color: #f56565; background: #fed7d7; }
        .option-letter { width: 32px; height: 32px; background: #e2e8f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; flex-shrink: 0; }
        .option-btn.selected .option-letter { background: #667eea; color: white; }
        .option-btn.correct .option-letter { background: #48bb78; color: white; }
        .option-btn.wrong .option-letter { background: #f56565; color: white; }
        .fill-input { width: 100%; padding: 15px; font-size: 1.1rem; border: 3px solid #e2e8f0; border-radius: 12px; font-family: inherit; }
        .fill-input:focus { outline: none; border-color: #667eea; }
        .action-btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 14px 20px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-secondary { background: #e2e8f0; color: #4a5568; }
        .btn-success { background: linear-gradient(135deg, #48bb78 0%, #38a169 100%); color: white; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.15); }
        .feedback { padding: 15px; border-radius: 10px; margin-top: 15px; font-size: 1rem; font-weight: 600; display: none; }
        .feedback.correct { display: block; background: #c6f6d5; color: #22543d; }
        .feedback.wrong { display: block; background: #fed7d7; color: #742a2a; }
        .feedback .explanation { margin-top: 8px; font-size: 0.9rem; font-weight: 400; }
        .result-summary { text-align: center; padding: 30px 15px; }
        .result-score { font-size: 3.5rem; font-weight: 800; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .result-message { font-size: 1.1rem; color: #4a5568; margin: 15px 0; }
        .result-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { background: #f7fafc; padding: 15px; border-radius: 10px; }
        .stat-number { font-size: 1.8rem; font-weight: 700; color: #5a67d8; }
        .stat-label { font-size: 0.85rem; color: #718096; }
        .vocab-list { max-height: 450px; overflow-y: auto; }
        .vocab-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #e2e8f0; }
        .vocab-item:hover { background: #f7fafc; }
        .vocab-word { font-size: 1.1rem; font-weight: 700; color: #2d3748; }
        .vocab-ipa { font-size: 0.85rem; color: #667eea; }
        .vocab-meaning { color: #4a5568; font-size: 0.95rem; text-align: right; }

        .vocab-btn:hover { background: #667eea; color: white; }
        .mode-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .mode-btn { background: #f7fafc; border: 3px solid #e2e8f0; border-radius: 12px; padding: 15px; font-size: 0.95rem; font-weight: 700; cursor: pointer; text-align: center; }
        .mode-btn:hover { border-color: #667eea; background: #e0e7ff; }

</head>
<body>
    <div class="container">
        <div class="header">
            <div class="shrimp-icon">🦐</div>
            <h1>小五英文測驗</h1>
            <p class="subtitle">2025年第二學期考試溫習</p>

        <div id="menu-section" class="section active">
            <div class="card">
                <h2 class="card-title">📚 選擇溫習單元</h2>

                    <button class="menu-btn" onclick="showQuizMode('unit2')">
                        <span class="icon">🏠</span>
                        <span>Unit 2<br>家居 (14詞)</span>
                    </button>
                    <button class="menu-btn" onclick="showQuizMode('unit3')">
                        <span class="icon">🏆</span>
                        <span>Unit 3<br>運動比賽 (25詞)</span>
                    </button>
                    <button class="menu-btn" onclick="showQuizMode('unit4')">
                        <span class="icon">🍽️</span>
                        <span>Unit 4<br>外出用餐 (36詞)</span>
                    </button>
                    <button class="menu-btn secondary" onclick="showQuizMode('grammar')">
                        <span class="icon">✏️</span>
                        <span>文法練習<br>(50題)</span>
                    </button>
                    <button class="menu-btn warning" onclick="showQuizMode('mixed')">
                        <span class="icon">🎲</span>
                        <span>混合測驗<br>(全部單元)</span>
                    </button>
                    <button class="menu-btn success" onclick="showVocabulary()">
                        <span class="icon">📖</span>
                        <span>溫習生字<br>+讀音</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="quiz-mode-section" class="section">
            <div class="card">
                <h2 class="card-title">🎯 選擇題目類型</h2>
                <div class="mode-grid">
                    <button class="mode-btn" onclick="selectMode('choice')">
                        <div style="font-size: 1.8rem; margin-bottom: 5px;">🔘</div>
                        <div>選擇題</div>
                        <div style="font-size: 0.8rem; opacity: 0.8; margin-top: 3px;">全部生字</div>
                    </button>
                    <button class="mode-btn" onclick="selectMode('fill')">
                        <div style="font-size: 1.8rem; margin-bottom: 5px;">✍️</div>
                        <div>填空題</div>
                        <div style="font-size: 0.8rem; opacity: 0.8; margin-top: 3px;">僅限Productive</div>
                    </button>
                </div>
                <button class="btn btn-secondary back-btn" onclick="backToMenu()">返回選單</button>
            </div>
        </div>

        <div id="quiz-section" class="section">
            <div class="card">
                <div class="quiz-header">
                    <span class="quiz-progress">題目 <span id="current-q">1</span> / <span id="total-q">10</span></span>
                    <span class="quiz-score">得分: <span id="score">0</span></span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-bar" style="width: 10%"></div>
                </div>
                <div id="question-container"></div>
                <div class="action-btns">
                    <button class="btn btn-secondary" onclick="backToMenu()">返回選單</button>
                    <button class="btn btn-primary" id="check-btn" onclick="checkAnswer()">檢查答案</button>
                    <button class="btn btn-success" id="next-btn" onclick="nextQuestion()" style="display:none">下一題</button>
                </div>
            </div>
        </div>

        <div id="results-section" class="section">
            <div class="card">
                <div class="result-summary">
                    <div class="result-score"><span id="final-score">0</span>%</div>
                    <p class="result-message" id="result-message">做得好！</p>
                    <div class="result-stats">
                        <div class="stat-box">
                            <div class="stat-number" id="correct-count">0</div>
                            <div class="stat-label">答對</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-number" id="wrong-count">0</div>
                            <div class="stat-label">答錯</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-number" id="total-count">0</div>
                            <div class="stat-label">總題數</div>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="backToMenu()" style="width: 100%;">返回主選單</button>
                </div>
            </div>
        </div>

        <div id="vocab-section" class="section">
            <div class="card">
                <h2 class="card-title">📖 溫習生字 + 讀音</h2>
                <div class="menu-grid" style="margin-bottom: 15px;">
                    <button class="menu-btn" onclick="showUnitVocab('unit2')">Unit 2</button>
                    <button class="menu-btn" onclick="showUnitVocab('unit3')">Unit 3</button>
                    <button class="menu-btn" onclick="showUnitVocab('unit4')">Unit 4</button>
                </div>
                <div id="vocab-list-container" class="vocab-list"></div>
                <button class="btn btn-secondary back-btn" onclick="backToMenu()">返回主選單</button>
            </div>
        </div>
    </div>

// Quiz State
let currentQuestions = [];
let currentQuestionIndex = 0;
let score = 0;
let correctAnswers = 0;
let selectedOption = null;
let answered = false;
let selectedUnit = null;
let selectedMode = null;

// Generate questions for each word
function generateQuestionsForUnit(unitId, mode) {
    const unit = vocabData[unitId];
    if (!unit) return [];
    
    const questions = [];
    
    if (mode === 'choice') {
        // Multiple choice: Chinese to English - ALL words (productive + receptive)
        const allWords = unit.words;
        for (let i = 0; i < allWords.length; i++) {
            const word = allWords[i];
            const otherWords = allWords.filter((w, idx) => idx !== i);
            const options = [word.word];
            
            // Add 3 wrong options
            for (let j = 0; j < 3 && j < otherWords.length; j++) {
                const randomWord = otherWords[Math.floor(Math.random() * otherWords.length)].word;
                if (!options.includes(randomWord)) {
                    options.push(randomWord);
                }
            }
            
            // Shuffle options
            for (let j = options.length - 1; j > 0; j--) {
                const k = Math.floor(Math.random() * (j + 1));
                [options[j], options[k]] = [options[k], options[j]];
            }
            
            questions.push({
                type: 'multiple_choice',
                question: `"${word.meaning}" 的英文是什麼？`,
                word: word.word,
                ipa: word.ipa,
                options: options,
                answer: options.indexOf(word.word),
                explanation: `${word.word} ${word.ipa} (${word.type}) = ${word.meaning}`
            });
        }
    } else if (mode === 'fill') {
        // Fill in blank questions - ONLY productive words
        const productiveWords = unit.words.filter(w => w.category === 'productive');
        const templates = [
            { template: "The __________ is very useful.", context: "這個______很有用。" },
            { template: "I like this __________ very much.", context: "我很喜歡這個______。" },
            { template: "We need to buy a new __________.", context: "我們需要買一個新的______。" }
        ];
        
        productiveWords.forEach((word, index) => {
            const template = templates[index % templates.length];
            questions.push({
                type: 'fill_blank',
                question: template.template,
                answer: word.word,
                ipa: word.ipa,
                chinese: template.context.replace('______', word.meaning),
                explanation: `${word.word} ${word.ipa} = ${word.meaning}`
            });
        });
    }
    
    return questions;
}

// Show quiz mode selection
function showQuizMode(unitOrType) {
    selectedUnit = unitOrType;
    
    if (unitOrType === 'grammar') {
        currentQuestions = [...grammarQuestions];
        for (let i = currentQuestions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [currentQuestions[i], currentQuestions[j]] = [currentQuestions[j], currentQuestions[i]];
        }
        startQuiz();
    } else if (unitOrType === 'mixed') {
        currentQuestions = [];
        ['unit2', 'unit3', 'unit4'].forEach(unit => {
            const unitWords = vocabData[unit].words;
            const selectedWords = unitWords.slice(0, 8);
            
            selectedWords.forEach((word, idx) => {
                const otherWords = unitWords.filter((w, i) => i !== idx).slice(0, 5);
                const options = [word.word];
                
                for (let j = 0; j < 3 && j < otherWords.length; j++) {
                    const randomWord = otherWords[Math.floor(Math.random() * otherWords.length)].word;
                    if (!options.includes(randomWord)) {
                        options.push(randomWord);
                    }
                }
                
                for (let j = options.length - 1; j > 0; j--) {
                    const k = Math.floor(Math.random() * (j + 1));
                    [options[j], options[k]] = [options[k], options[j]];
                }
                
                currentQuestions.push({
                    type: 'multiple_choice',
                    question: `"${word.meaning}" 的英文是什麼？`,
                    word: word.word,
                    ipa: word.ipa,
                    options: options,
                    answer: options.indexOf(word.word),
                    explanation: `${word.word} ${word.ipa} (${word.type}) = ${word.meaning}`
                });
            });
        });
        
        for (let i = currentQuestions.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [currentQuestions[i], currentQuestions[j]] = [currentQuestions[j], currentQuestions[i]];
        }
        startQuiz();
    } else {
        document.getElementById('menu-section').classList.remove('active');
        document.getElementById('quiz-mode-section').classList.add('active');
    }
}

// Select mode (choice or fill)
function selectMode(mode) {
    selectedMode = mode;
    currentQuestions = generateQuestionsForUnit(selectedUnit, mode);
    
    for (let i = currentQuestions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [currentQuestions[i], currentQuestions[j]] = [currentQuestions[j], currentQuestions[i]];
    }
    
    startQuiz();
}

// Start quiz
function startQuiz() {
    if (currentQuestions.length === 0) {
        alert('暫時沒有題目！');
        return;
    }
    
    currentQuestionIndex = 0;
    score = 0;
    correctAnswers = 0;
    answered = false;
    selectedOption = null;
    
    document.getElementById('menu-section').classList.remove('active');
    document.getElementById('quiz-mode-section').classList.remove('active');
    document.getElementById('quiz-section').classList.add('active');
    document.getElementById('results-section').classList.remove('active');
    
    updateProgress();
    showQuestion();
}

// Show current question
function showQuestion() {
    const question = currentQuestions[currentQuestionIndex];
    const container = document.getElementById('question-container');
    
    answered = false;
    selectedOption = null;
    
    let html = `
        <div class="question-card">
            <div class="question-type">第 ${currentQuestionIndex + 1} 題${question.ipa ? ' • 讀音: ' + question.ipa : ''}</div>
            <div class="question-text">${question.question}</div>
        </div>
    `;
    
    if (question.type === 'multiple_choice') {
        html += '<div class="options-grid">';
        question.options.forEach((option, index) => {
            const letter = ['A', 'B', 'C', 'D'][index];
            html += `
                <button class="option-btn" onclick="selectOption(${index})" data-index="${index}">
                    <span class="option-letter">${letter}</span>
                    <span>${option}</span>
                </button>
            `;
        });
        html += '</div>';
    } else if (question.type === 'fill_blank') {
        html += `
            <input type="text" class="fill-input" id="fill-answer" placeholder="請輸入答案..." autocomplete="off">
        `;
    }
    
    html += '<div id="feedback" class="feedback"></div>';
    
    container.innerHTML = html;
    
    document.getElementById('check-btn').style.display = 'block';
    document.getElementById('check-btn').disabled = false;
    document.getElementById('next-btn').style.display = 'none';
}

// Select option
function selectOption(index) {
    if (answered) return;
    
    selectedOption = index;
    
    document.querySelectorAll('.option-btn').forEach((btn, i) => {
        btn.classList.remove('selected');
        if (i === index) {
            btn.classList.add('selected');
        }
    });
}

// Check answer
function checkAnswer() {
    if (answered) return;
    
    const question = currentQuestions[currentQuestionIndex];
    const feedbackEl = document.getElementById('feedback');
    
    let isCorrect = false;
    
    if (question.type === 'multiple_choice') {
        if (selectedOption === null) {
            alert('請選擇一個答案！');
            return;
        }
        isCorrect = selectedOption === question.answer;
    } else if (question.type === 'fill_blank') {
        const inputEl = document.getElementById('fill-answer');
        if (!inputEl) return;
        
        const answer = inputEl.value.trim().toLowerCase();
        if (!answer) {
            alert('請輸入答案！');
            return;
        }
        
        const correctAnswers = question.answer.toLowerCase().split('/').map(a => a.trim());
        isCorrect = correctAnswers.includes(answer);
    }
    
    answered = true;
    
    if (question.type === 'multiple_choice') {
        document.querySelectorAll('.option-btn').forEach((btn, i) => {
            if (i === question.answer) {
                btn.classList.add('correct');
            } else if (i === selectedOption && !isCorrect) {
                btn.classList.add('wrong');
            }
        });
    }
    
    if (isCorrect) {
        score += 10;
        correctAnswers++;
        feedbackEl.className = 'feedback correct';
        feedbackEl.innerHTML = `✅ 正確！<div class="explanation">${question.explanation || ''}</div>`;
        
        if (question.word) {
            setTimeout(() => speakWord(question.word), 500);
        }
    } else {
        feedbackEl.className = 'feedback wrong';
        const correctAnswer = question.type === 'multiple_choice' 
            ? question.options[question.answer] 
            : question.answer;
        feedbackEl.innerHTML = `❌ 錯誤！正確答案是: <strong>${correctAnswer}</strong><div class="explanation">${question.explanation || ''}</div>`;
    }
    
    document.getElementById('score').textContent = score;
    
    document.getElementById('check-btn').style.display = 'none';
    document.getElementById('next-btn').style.display = 'block';
    
    if (currentQuestionIndex === currentQuestions.length - 1) {
        document.getElementById('next-btn').textContent = '查看成績';
    }
}

// Next question
function nextQuestion() {
    if (currentQuestionIndex < currentQuestions.length - 1) {
        currentQuestionIndex++;
        updateProgress();
        showQuestion();
    } else {
        showResults();
    }
}

// Update progress
function updateProgress() {
    document.getElementById('current-q').textContent = currentQuestionIndex + 1;
    document.getElementById('total-q').textContent = currentQuestions.length;
    
    const progress = ((currentQuestionIndex + 1) / currentQuestions.length) * 100;
    document.getElementById('progress-bar').style.width = progress + '%';
    document.getElementById('next-btn').textContent = '下一題';
}

// Show results
function showResults() {
    document.getElementById('quiz-section').classList.remove('active');
    document.getElementById('results-section').classList.add('active');
    
    const percentage = Math.round((correctAnswers / currentQuestions.length) * 100);
    document.getElementById('final-score').textContent = percentage;
    document.getElementById('correct-count').textContent = correctAnswers;
    document.getElementById('wrong-count').textContent = currentQuestions.length - correctAnswers;
    document.getElementById('total-count').textContent = currentQuestions.length;
    
    let message = '';
    if (percentage >= 90) {
        message = '🎉 太棒了！你係英文高手！';
    } else if (percentage >= 70) {
        message = '👍 做得好！繼續努力！';
    } else if (percentage >= 50) {
        message = '💪 有進步空間，再溫習一下！';
    } else {
        message = '📚 再多練習，你一定得嘅！';
    }
    document.getElementById('result-message').textContent = message;
}

// Show vocabulary list
function showVocabulary() {
    document.getElementById('menu-section').classList.remove('active');
    document.getElementById('vocab-section').classList.add('active');
    showUnitVocab('unit2');
}

// Show specific unit vocabulary
function showUnitVocab(unitId) {
    const unit = vocabData[unitId];
    if (!unit) return;
    
    const container = document.getElementById('vocab-list-container');
    let html = `<h3 style="margin-bottom: 15px; color: #5a67d8;">${unit.name}</h3>
        <div style="margin-bottom: 10px; font-size: 0.85rem; color: #718096;">
            Productive: 需要拼寫 | Receptive: 只需辨認
        </div>`;
    
    unit.words.forEach(item => {
        const badge = item.category === 'productive' 
            ? '<span style="background: #c6f6d5; color: #22543d; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem;">Productive</span>'
            : '<span style="background: #e0e7ff; color: #5a67d8; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem;">Receptive</span>';
        
        html += `
            <div class="vocab-item">
                <div>
                    <div class="vocab-word">${item.word} ${badge}</div>
                    <div class="vocab-ipa">${item.ipa} <span style="color: #718096;">${item.type}</span></div>
                </div>
                <div style="text-align: right;">
                    <div class="vocab-meaning">${item.meaning}</div>
                    <button class="vocab-btn" onclick="speakWord('${item.word}')">🔊 讀音</button>
                </div>
            </div>
        `;
    });
    
    container.innerHTML = html;
}

// Text to speech
function speakWord(word) {
    if (typeof responsiveVoice !== 'undefined') {
        responsiveVoice.speak(word, "UK English Female", { rate: 0.9, pitch: 1, volume: 1 });
    } else if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = 'en-GB';
        utterance.rate = 0.8;
        speechSynthesis.speak(utterance);
    }
}

// Back to menu
function backToMenu() {
    selectedUnit = null;
    selectedMode = null;
    document.getElementById('menu-section').classList.add('active');
    document.getElementById('quiz-mode-section').classList.remove('active');
    document.getElementById('quiz-section').classList.remove('active');
    document.getElementById('results-section').classList.remove('active');
    document.getElementById('vocab-section').classList.remove('active');
}
